env_name: pusher
agent_specs:
  batch_design: true
# training parameters
gamma: 0.995
tau: 0.95
policy_specs:
  control_log_std: -0.5

robot_param_scale: 1
skel_transform_nsteps: 5

done_condition:
  max_ang: 60

obs_specs:
  attr: ['depth']
  sim: []
  design: true
  clip_qvel: true
  use_projected_params: true
  use_body_ind: true
max_body_depth: 4

add_body_condition:
  max_nchild: 2

robot:
  param_mapping: sin
  no_root_offset: true
  
  # M2 ablation (2026-07-15): bone_offset を設計変数から外す（リンク長 0.30/0.25 で凍結）。
  # gear のみの貢献度を分離する
  body_params: {}

  joint_params: {}

  geom_params:
    size:
      lb: 0.03
      ub: 0.10
    ext_start:
      lb: 0.0
      ub: 0.2

  actuator_params:
    gear:
      lb: 20
      ub: 400
  

